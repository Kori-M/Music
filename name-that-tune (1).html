<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Name That Tune</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08090b;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #eceae4;
    --muted: #6b6a66;
    --accent: #e8f74a;
    --accent-dim: rgba(232,247,74,0.1);
    --correct: #4af799;
    --correct-dim: rgba(74,247,153,0.12);
    --wrong: #f74a4a;
    --wrong-dim: rgba(247,74,74,0.12);
  }

  html, body {
    height: 100%;
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3rem;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); }

  .score-pill {
    font-family: 'Syne Mono', monospace;
    font-size: 0.8rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border2);
    border-radius: 999px;
    color: var(--muted);
  }

  .score-pill b { color: var(--accent); }

  /* MAIN CARD */
  .card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  /* SETUP SCREEN */
  #setup {
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .setup-title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .setup-title span { color: var(--accent); }

  .setup-title small {
    display: block;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .genre-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.5rem;
  }

  .genre-btn {
    padding: 0.6rem 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .genre-btn:hover { border-color: var(--border2); color: var(--text); }

  .genre-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .rounds-row {
    display: flex;
    gap: 0.5rem;
  }

  .round-btn {
    flex: 1;
    padding: 0.55rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Syne Mono', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .round-btn:hover { border-color: var(--border2); color: var(--text); }
  .round-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .start-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #08090b;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* GAME SCREEN */
  #game { display: none; flex-direction: column; }

  .progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .game-inner { padding: 2rem 2.5rem 2.5rem; }

  .round-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  /* PLAYER */
  .player {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }

  .album-art {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: var(--bg);
    object-fit: cover;
    flex-shrink: 0;
    filter: blur(8px);
    transition: filter 0.4s;
  }

  .album-art.revealed { filter: blur(0); }

  .player-info { flex: 1; min-width: 0; }

  .player-song-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-song-name.revealed { color: var(--text); }

  .player-artist {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
  }

  .play-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .play-btn:active { transform: scale(0.97); }
  .play-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .play-icon { fill: #08090b; }

  .timer-ring {
    position: absolute;
    top: 1rem; right: 1rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* CHOICES */
  .choices { display: flex; flex-direction: column; gap: 0.6rem; }

  .choice-btn {
    width: 100%;
    padding: 0.9rem 1.2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .choice-btn:not(:disabled):hover {
    border-color: var(--border2);
    background: #1f222a;
  }

  .choice-btn:disabled { cursor: default; }

  .choice-btn.correct {
    background: var(--correct-dim);
    border-color: var(--correct);
    color: var(--correct);
  }

  .choice-btn.wrong {
    background: var(--wrong-dim);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .choice-letter {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-family: 'Syne Mono', monospace;
    flex-shrink: 0;
    color: var(--muted);
  }

  .choice-btn.correct .choice-letter { background: var(--correct); border-color: var(--correct); color: #08090b; }
  .choice-btn.wrong .choice-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

  .feedback {
    margin-top: 1.2rem;
    padding: 0.9rem 1.1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 0.6rem;
  }

  .feedback.correct { background: var(--correct-dim); border: 1px solid var(--correct); color: var(--correct); display: flex; }
  .feedback.wrong { background: var(--wrong-dim); border: 1px solid var(--wrong); color: var(--wrong); display: flex; }

  .next-btn {
    width: 100%;
    margin-top: 1.2rem;
    padding: 0.85rem;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  .next-btn:hover { background: var(--surface2); }

  /* RESULTS */
  #results { display: none; flex-direction: column; padding: 2.5rem; gap: 1.5rem; }

  .results-title {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .big-score {
    font-size: 4rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .big-score span { font-size: 1.5rem; color: var(--muted); font-weight: 400; }

  .result-message {
    font-size: 1rem;
    color: var(--muted);
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
  }

  .result-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .result-stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .result-stat-val {
    font-size: 1.4rem;
    font-weight: 700;
  }

  .play-again-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #08090b;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .play-again-btn:hover { opacity: 0.9; }

  /* LOADING */
  #loading { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; gap: 1rem; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.85rem; color: var(--muted); }

  /* ERROR */
  #error { display: none; flex-direction: column; align-items: center; padding: 3rem 2rem; gap: 1rem; text-align: center; }
  .error-text { color: var(--wrong); font-weight: 600; }
  .error-sub { font-size: 0.85rem; color: var(--muted); }
  .retry-btn {
    padding: 0.7rem 1.5rem;
    background: var(--wrong-dim);
    border: 1px solid var(--wrong);
    color: var(--wrong);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .animate-in { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="logo">name<span>that</span>tune</div>
  <div class="score-pill">score <b id="header-score">0</b></div>
</header>

<div class="card">

  <!-- SETUP -->
  <div id="setup">
    <div class="setup-title">
      Name That Tune
      <small>Pick a decade, hit play, and guess the song.</small>
    </div>

    <div class="field">
      <label>Decade</label>
      <div class="genre-grid" id="genre-grid">
        <button class="genre-btn" data-genre="1960s">🎙 1960s</button>
        <button class="genre-btn" data-genre="1970s">🕺 1970s</button>
        <button class="genre-btn" data-genre="1980s">📼 1980s</button>
        <button class="genre-btn" data-genre="1990s">📻 1990s</button>
        <button class="genre-btn" data-genre="2000s">💿 2000s</button>
        <button class="genre-btn active" data-genre="2010s">📱 2010s</button>
        <button class="genre-btn" data-genre="2020s">🔥 2020s</button>
      </div>
    </div>

    <div class="field">
      <label>Rounds</label>
      <div class="rounds-row" id="rounds-row">
        <button class="round-btn" data-rounds="5">5</button>
        <button class="round-btn active" data-rounds="10">10</button>
        <button class="round-btn" data-rounds="15">15</button>
        <button class="round-btn" data-rounds="20">20</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn">Start Game</button>
  </div>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Fetching songs from iTunes…</div>
  </div>

  <!-- ERROR -->
  <div id="error">
    <div class="error-text">⚠ Couldn't load songs</div>
    <div class="error-sub" id="error-msg">Check your connection and try again.</div>
    <button class="retry-btn" id="retry-btn">Try Again</button>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="game-inner">
      <div class="round-label" id="round-label">Round 1 of 10</div>

      <div class="player">
        <img class="album-art" id="album-art" src="" alt="Album art"/>
        <div class="player-info">
          <div class="player-song-name" id="song-display">?????</div>
          <div class="player-artist" id="artist-display">—</div>
        </div>
        <button class="play-btn" id="play-btn" title="Play preview">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <polygon points="4,2 16,9 4,16" class="play-icon"/>
          </svg>
        </button>
        <div class="timer-ring" id="timer-display"></div>
      </div>

      <div class="choices" id="choices"></div>

      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn">Next round →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="results-title" id="results-title">Game Over!</div>
    <div class="big-score"><span id="results-score">0</span> <span>pts</span></div>
    <div class="result-message" id="result-message"></div>
    <div class="result-breakdown">
      <div class="result-stat">
        <div class="result-stat-label">Correct</div>
        <div class="result-stat-val" id="stat-correct" style="color:var(--correct)">0</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">Wrong</div>
        <div class="result-stat-val" id="stat-wrong" style="color:var(--wrong)">0</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">Accuracy</div>
        <div class="result-stat-val" id="stat-accuracy">0%</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">Best Streak</div>
        <div class="result-stat-val" id="stat-streak" style="color:var(--accent)">0</div>
      </div>
    </div>
    <button class="play-again-btn" id="play-again-btn">Play Again</button>
  </div>

</div>

<audio id="audio-player"></audio>

<script>
const $ = id => document.getElementById(id);

// State
let selectedDecade = '2010s';
let selectedRounds = 10;
let songs = [];
let currentRound = 0;
let currentSong = null;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let streak = 0;
let bestStreak = 0;
let answered = false;
let audio = $('audio-player');
let isPlaying = false;

// Decade grid
$('genre-grid').addEventListener('click', e => {
  const btn = e.target.closest('.genre-btn');
  if (!btn) return;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDecade = btn.dataset.genre;
});

// Rounds
$('rounds-row').addEventListener('click', e => {
  const btn = e.target.closest('.round-btn');
  if (!btn) return;
  document.querySelectorAll('.round-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRounds = parseInt(btn.dataset.rounds);
});

$('start-btn').addEventListener('click', startGame);
$('retry-btn').addEventListener('click', startGame);
$('play-again-btn').addEventListener('click', () => { show('setup'); resetState(); });
$('next-btn').addEventListener('click', nextRound);
$('play-btn').addEventListener('click', togglePlay);

function show(screen) {
  ['setup','loading','error','game','results'].forEach(s => {
    const el = $(s);
    el.style.display = 'none';
  });
  const target = $(screen);
  target.style.display = 'flex';
  target.classList.add('animate-in');
  setTimeout(() => target.classList.remove('animate-in'), 300);
}

function resetState() {
  score = 0; correctCount = 0; wrongCount = 0;
  streak = 0; bestStreak = 0; currentRound = 0;
  $('header-score').textContent = '0';
  stopAudio();
}

async function startGame() {
  resetState();
  show('loading');
  try {
    const tracks = await fetchTracks(selectedDecade);
    if (!tracks || tracks.length < 4) throw new Error('Not enough tracks with previews found. Try a different genre.');
    songs = shuffle(tracks).slice(0, selectedRounds + 20);
    show('game');
    loadRound();
  } catch (err) {
    $('error-msg').textContent = err.message || 'Could not load songs. Try again.';
    show('error');
  }
}

async function fetchTracks(decade) {
  const searchTerms = {
    '1960s': 'top hits 1960s',
    '1970s': 'top hits 1970s',
    '1980s': 'greatest hits 1980s',
    '1990s': 'greatest hits 1990s',
    '2000s': 'top hits 2000s',
    '2010s': 'top hits 2010s',
    '2020s': 'top hits 2020s'
  };
  const term = encodeURIComponent(searchTerms[decade] || decade);

  // Try direct iTunes first, then fall back to CORS proxy
  const urls = [
    `https://itunes.apple.com/search?term=${term}&media=music&entity=song&limit=50&explicit=no`,
    `https://corsproxy.io/?url=${encodeURIComponent(`https://itunes.apple.com/search?term=${term}&media=music&entity=song&limit=50&explicit=no`)}`
  ];

  let lastErr = null;
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      const filtered = data.results.filter(t => t.previewUrl && t.artworkUrl100 && t.trackName && t.artistName);
      if (filtered.length >= 4) return filtered;
    } catch (e) { lastErr = e; }
  }
  throw new Error('Could not load songs. This game needs to run on a web server (not opened as a local file). Try uploading to GitHub Pages.');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadRound() {
  if (currentRound >= selectedRounds) { endGame(); return; }
  answered = false;
  stopAudio();

  const progress = (currentRound / selectedRounds) * 100;
  $('progress-bar').style.width = progress + '%';
  $('round-label').textContent = `Round ${currentRound + 1} of ${selectedRounds}`;

  currentSong = songs[currentRound];

  // Reset player UI
  const art = $('album-art');
  art.src = currentSong.artworkUrl100.replace('100x100', '300x300');
  art.classList.remove('revealed');
  $('song-display').textContent = '?????';
  $('song-display').classList.remove('revealed');
  $('artist-display').textContent = '—';
  $('timer-display').textContent = '';

  // Reset play button
  $('play-btn').disabled = false;
  updatePlayBtn(false);

  // Build choices
  const wrongPool = songs.filter((s, i) => i !== currentRound && s.trackName !== currentSong.trackName);
  const wrong3 = shuffle(wrongPool).slice(0, 3);
  const choices = shuffle([currentSong, ...wrong3]);
  const letters = ['A','B','C','D'];

  const container = $('choices');
  container.innerHTML = '';
  choices.forEach((song, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span>${song.trackName} — ${song.artistName}`;
    btn.dataset.correct = (song.trackName === currentSong.trackName) ? '1' : '0';
    btn.addEventListener('click', () => handleAnswer(btn, choices));
    container.appendChild(btn);
  });

  $('feedback').className = 'feedback';
  $('feedback').textContent = '';
  $('next-btn').style.display = 'none';
}

function handleAnswer(chosen, choices) {
  if (answered) return;
  answered = true;
  stopAudio();

  // Reveal artwork and song name
  $('album-art').classList.add('revealed');
  $('song-display').textContent = currentSong.trackName;
  $('song-display').classList.add('revealed');
  $('artist-display').textContent = currentSong.artistName;

  const isCorrect = chosen.dataset.correct === '1';

  // Style all buttons
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.correct === '1') btn.classList.add('correct');
    else if (btn === chosen && !isCorrect) btn.classList.add('wrong');
  });

  const fb = $('feedback');
  if (isCorrect) {
    score += 100;
    correctCount++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    fb.className = 'feedback correct animate-in';
    fb.textContent = streak > 1 ? `✓ Correct! ${streak}x streak! +100 pts` : '✓ Correct! +100 pts';
  } else {
    wrongCount++;
    streak = 0;
    fb.className = 'feedback wrong animate-in';
    fb.textContent = `✗ The answer was: ${currentSong.trackName}`;
  }

  $('header-score').textContent = score;
  $('next-btn').style.display = 'block';
  currentRound++;
}

function nextRound() {
  loadRound();
}

function endGame() {
  $('progress-bar').style.width = '100%';
  stopAudio();
  show('results');

  const pct = Math.round((correctCount / selectedRounds) * 100);
  let title = 'Game Over!';
  let msg = '';
  if (pct === 100) { title = 'Perfect Score! 🎉'; msg = 'You got every single one. Incredible!'; }
  else if (pct >= 80) { title = 'Nicely Done! 🎵'; msg = 'You really know your music.'; }
  else if (pct >= 60) { title = 'Not Bad! 🎶'; msg = 'Solid effort — keep listening!'; }
  else if (pct >= 40) { title = 'Keep Practicing 🎧'; msg = 'More listening sessions needed.'; }
  else { title = 'Tough Round 😅'; msg = 'The music gods are unimpressed. Try again!'; }

  $('results-title').textContent = title;
  $('results-score').textContent = score;
  $('result-message').textContent = msg;
  $('stat-correct').textContent = correctCount;
  $('stat-wrong').textContent = wrongCount;
  $('stat-accuracy').textContent = pct + '%';
  $('stat-streak').textContent = bestStreak;
}

function togglePlay() {
  if (isPlaying) {
    stopAudio();
  } else {
    playPreview();
  }
}

function playPreview() {
  if (!currentSong || !currentSong.previewUrl) return;
  audio.src = currentSong.previewUrl;
  audio.play().catch(() => {});
  isPlaying = true;
  updatePlayBtn(true);

  // Auto-stop after 15 seconds
  clearTimeout(window._stopTimer);
  window._stopTimer = setTimeout(() => stopAudio(), 15000);

  let secs = 15;
  clearInterval(window._timerInterval);
  $('timer-display').textContent = secs + 's';
  window._timerInterval = setInterval(() => {
    secs--;
    if (secs <= 0) { clearInterval(window._timerInterval); $('timer-display').textContent = ''; }
    else $('timer-display').textContent = secs + 's';
  }, 1000);
}

function stopAudio() {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  clearTimeout(window._stopTimer);
  clearInterval(window._timerInterval);
  $('timer-display').textContent = '';
  updatePlayBtn(false);
}

function updatePlayBtn(playing) {
  $('play-btn').innerHTML = playing
    ? `<svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="4" height="12" fill="#08090b"/><rect x="10" y="2" width="4" height="12" fill="#08090b"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 18 18"><polygon points="4,2 16,9 4,16" class="play-icon" fill="#08090b"/></svg>`;
}

audio.addEventListener('ended', () => { isPlaying = false; updatePlayBtn(false); clearInterval(window._timerInterval); $('timer-display').textContent = ''; });
</script>
</body>
</html>
