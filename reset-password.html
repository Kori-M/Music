<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Ear Candy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a0f; --surface:#111118; --card:#16161f; --border:#2a2a3a;
      --accent:#ff2d55; --accent2:#ff6b35; --text:#f0f0f8; --muted:#6b6b85;
      --success:#30d158; --danger:#ff453a;
    }
    body {
      background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,45,85,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,107,53,0.06) 0%, transparent 60%);
    }
    .auth-wrap { position:relative; z-index:1; width:100%; max-width:400px; }
    .logo {
      font-family:'Bebas Neue',sans-serif; font-size:64px; letter-spacing:0.04em;
      line-height:0.9; text-align:center; margin-bottom:6px;
      background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .sub { text-align:center; font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:36px; }
    .card { background:var(--card); border:1.5px solid var(--border); border-radius:24px; padding:32px; }
    .card-title { font-family:'Bebas Neue',sans-serif; font-size:32px; margin-bottom:4px; }
    .card-desc { font-size:13px; color:var(--muted); margin-bottom:24px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; letter-spacing:0.03em; }
    .pw-wrap { position:relative; }
    .field input {
      width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:12px;
      padding:13px 16px; padding-right:46px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); transition:border-color 0.2s;
    }
    .field input:focus { outline:none; border-color:var(--accent); }
    .field input::placeholder { color:#44445a; }
    .pw-toggle {
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      background:transparent; border:none; cursor:pointer; font-size:16px;
      padding:8px 10px; opacity:0.5; transition:opacity 0.2s; line-height:1;
    }
    .pw-toggle:hover { opacity:1; }
    .btn-primary {
      width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
      border:none; border-radius:50px; padding:15px; font-family:'DM Sans',sans-serif;
      font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s ease; margin-top:8px;
    }
    .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,45,85,0.35); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .msg { font-size:13px; padding:12px 14px; border-radius:10px; margin-bottom:16px; display:none; }
    .msg.show { display:block; }
    .msg.error { background:rgba(255,69,58,0.1); border:1px solid rgba(255,69,58,0.3); color:var(--danger); }
    .msg.success { background:rgba(48,209,88,0.1); border:1px solid rgba(48,209,88,0.3); color:var(--success); }
    .back { text-align:center; margin-top:16px; }
    .back a { font-size:12px; color:var(--muted); text-decoration:none; }
    .back a:hover { color:var(--text); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="logo">Ear Candy</div>
    <div class="sub">Music games</div>

    <div class="card">
      <div class="card-title">New Password</div>
      <div class="card-desc">Choose a new password for your account.</div>

      <div class="msg" id="msg"></div>

      <div class="field">
        <label for="password">New Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" />
          <button type="button" class="pw-toggle" onclick="togglePw('password', this)">👁</button>
        </div>
      </div>
      <div class="field">
        <label for="password2">Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="password2" placeholder="Type it again" autocomplete="new-password" />
          <button type="button" class="pw-toggle" onclick="togglePw('password2', this)">👁</button>
        </div>
      </div>

      <button class="btn-primary" id="reset-btn" onclick="doReset()">Update Password</button>
    </div>
    <div class="back"><a href="login.html">← Back to login</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = `msg show ${type}`;
    }
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    }

    async function doReset() {
      const pw1 = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;
      const btn = document.getElementById('reset-btn');

      if (pw1.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
      if (pw1 !== pw2) return showMsg('Passwords do not match.', 'error');

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await ecSupabase.auth.updateUser({ password: pw1 });
      if (error) {
        showMsg(error.message || 'Could not update password. The link may have expired — request a new one.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
        return;
      }
      showMsg('Password updated! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  </script>
</body>
</html>
